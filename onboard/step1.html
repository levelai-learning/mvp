<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Your Profile — LevelAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/app.css">
</head>
<body>
<nav class="topnav">
  <a href="/index.html" class="topnav__logo">
    <div class="topnav__logo-mark">🌿</div>
    <span>LevelAI</span>
  </a>

  <div class="topnav__controls">
    <button class="topnav__font-btn" data-font-btn>Change Font to Open Dyslexic</button>

    <div class="theme-toggle">
      <span>Light</span>
      <div class="theme-toggle__track" data-theme-track>
        <div class="theme-toggle__thumb"></div>
      </div>
      <span>Dark</span>
    </div>

    <span class="topnav__datetime" data-clock></span>
  </div>
</nav>

<main class="onboard-wrap fade-in">
  <div class="onboard-card">

    <button class="onboard-close" onclick="window.location='/index.html'" aria-label="Go back to start">×</button>

    <div class="onboard-step-header">
      <div class="onboard-step-badge">1</div>
      <div class="onboard-step-label">Step 1 of 5</div>
    </div>

    <h1 class="onboard-title">Welcome to LevelAI</h1>
    <p class="onboard-subtitle">Sign in with your institutional account or create a new profile.</p>

    <!-- SSO Options -->
    <div class="sso-list">
      <button class="sso-btn" data-sso="canvas">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="#E66000"/>
          <path d="M8 8h8v2H8V8zm0 3h8v2H8v-2zm0 3h5v2H8v-2z" fill="white"/>
        </svg>
        Continue with Canvas
      </button>
      <button class="sso-btn" data-sso="google">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      <button class="sso-btn" data-sso="microsoft">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
          <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
          <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
          <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
        </svg>
        Continue with Microsoft
      </button>
    </div>

    <div class="sso-divider">Or enter your details</div>

    <form data-step1-form>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;">
        <div class="form-group">
          <label class="form-label" for="firstName">First Name <span class="required">*</span></label>
          <input class="form-input" type="text" id="firstName" name="firstName" placeholder="e.g. Jane" autocomplete="given-name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="lastName">Last Name <span class="required">*</span></label>
          <input class="form-input" type="text" id="lastName" name="lastName" placeholder="e.g. Doe" autocomplete="family-name" required>
        </div>
      </div>

      <div class="onboard-footer">
        <a href="/index.html" class="onboard-back">← Back</a>
        <button type="submit" class="btn btn-primary" data-next-btn disabled>
          Next Step →
        </button>
      </div>
    </form>

  </div>

</main>

<footer class="footer">
  <div class="footer__logo">
    <div class="footer__logo-mark">🌿</div>
    <span>LevelAI</span>
  </div>
  <div class="footer__links">
    <a href="/teacher/dashboard.html">Teacher</a>
    <a href="/parent/dashboard.html">Parent</a>
    <a href="#">Help Center</a>
    <a href="#">Accessibility</a>
    <a href="/settings.html">Privacy Policy</a>
    <a href="#">Terms of Service</a>
  </div>
  <span>&copy; 2026 LevelAI. All rights reserved.</span>
</footer>
<script src="/assets/js/app.js"></script>
</body>
</html>
